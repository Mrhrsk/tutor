<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Portal v4 - Strict AI & Ranges</title>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --border: #e5e7eb; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Header */
        header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .tutor-branding { display: flex; align-items: center; gap: 10px; }
        .tutor-select { font-size: 1.5rem; font-weight: 800; border: none; background: transparent; cursor: pointer; border-bottom: 2px dashed #9ca3af; }

        /* Buttons */
        button { border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .primary-btn { background: var(--primary); color: white; }
        .report-btn { background: #7c3aed; color: white; margin-left: 10px; display: flex; align-items: center; gap: 5px; }
        .ai-btn { background: #0f172a; color: #38bdf8; font-weight: bold; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #38bdf8; }
        .delete-student { background: #fee2e2; color: #dc2626; font-size: 0.85rem; }

        /* Student Card */
        .student-card { background: var(--card); border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 10px; }

        /* Grid Layout */
        .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }

        /* Enhanced Lesson Unit */
        .lesson-unit { border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: #f9fafb; display: flex; flex-direction: column; gap: 8px; }

        .lesson-top { display: flex; justify-content: space-between; align-items: center; }
        .lesson-label { font-weight: 700; font-size: 0.9rem; color: #374151; width: 60%; border: none; background: transparent; }
        .delete-lesson-btn { color: #ef4444; cursor: pointer; font-size: 1.2rem; }

        .row { display: flex; gap: 8px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 50px; font-family: inherit; }

        /* Specific Input Styles */
        .input-grammar { border-color: #bfdbfe; background: #eff6ff; }
        .input-vocab { border-color: #bbf7d0; background: #f0fdf4; }
        .input-note { background: #fffbeb; border-color: #fcd34d; }

        .status-select { font-weight: 600; text-align: center; }
        .status-present { background-color: #dcfce7; color: #166534; }
        .status-late { background-color: #fef9c3; color: #854d0e; }
        .status-canceled { background-color: #ffedd5; color: #9a3412; }
        .status-absent { background-color: #fee2e2; color: #991b1b; }

        .add-lesson-btn { border: 2px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 2rem; cursor: pointer; min-height: 350px; }
        .add-lesson-btn:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

        /* REPORT MODAL STYLES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; width: 95%; max-width: 800px; height: 90vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
        .modal-footer { padding: 20px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px; }

        .ai-result-area { width: 100%; height: 350px; font-family: monospace; font-size: 0.9rem; padding: 15px; background: #f8fafc; border: 1px solid #cbd5e1; white-space: pre-wrap; }
        .api-key-container { background: #f1f5f9; padding: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #38bdf8; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="tutor-branding">
            <select id="tutorSelect" class="tutor-select" onchange="switchTutor(this.value)">
                <option value="" disabled selected>Select Tutor...</option>
            </select>
        </div>
        <div>
            <span id="status" style="margin-right:15px; font-weight:600; font-size:0.9rem;">Loading...</span>
            <button id="addStudentBtn" class="primary-btn" onclick="addNewStudent()" style="display:none;">+ Add Student</button>
        </div>
    </header>

    <div id="app"></div>
</div>

<div id="reportModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 style="margin:0">Generate Logical Report</h3>
            <span style="cursor:pointer; font-size:1.5rem;" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">

            <div style="display:flex; justify-content: space-between; align-items:center; flex-wrap: wrap; gap: 10px;">
                <div style="display:flex; gap:10px; align-items:center;">
                    <label style="font-weight:bold;">Report Range:</label>
                    <select id="startLessonSelect" style="width: 120px; padding: 4px;"></select>
                    <span> to </span>
                    <select id="endLessonSelect" style="width: 120px; padding: 4px;"></select>
                </div>
                <div class="api-key-container">
                    <label style="font-size: 0.8rem; color: #475569;">Gemini API Key:</label>
                    <input type="password" id="geminiApiKey" placeholder="AIzaSy..." style="width: 150px; padding: 4px;">
                </div>
            </div>

            <input type="hidden" id="currentReportStudentId">

            <button class="ai-btn" onclick="generateWithAI()">✨ Generate Factual AI Report</button>
            <div id="aiLoader" class="loader"></div>

            <label style="font-weight: bold; margin-top: 10px;">Final Report Text:</label>
            <textarea id="ai-final-report" class="ai-result-area" placeholder="The generated report will appear here. You can edit it manually before copying."></textarea>

        </div>
        <div class="modal-footer">
            <button onclick="closeModal()" style="background:#e5e7eb; color:#374151;">Close</button>
            <button onclick="copyReport()" class="primary-btn" style="background:#059669;">📋 Copy for WhatsApp</button>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDYYJf56i-PJy-5d4O-DJE-MCZOb9MX3iUiCUllDW-kUraQOCTlZ5Da1PAymNQaycB/exec";

    let allStudents = [];
    let currentTutor = localStorage.getItem('lastTutor') || "";
    let saveTimeout;

    // --- INITIALIZATION ---
    async function loadData() {
        updateStatus("Loading...", "saving");
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('geminiApiKey').value = savedKey;

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const data = await response.json();
            allStudents = data.map(item => {
                let parsed = JSON.parse(item.json);
                return {
                    id: parsed.id || Date.now(),
                    tutor: item.tutor || "Unassigned",
                    name: item.name,
                    meetLink: parsed.meetLink || "",
                    lessons: parsed.lessons || createDefaultLessons()
                };
            });
            initTutorDropdown();
            if (currentTutor && getUniqueTutors().includes(currentTutor)) render();
            else {
                document.getElementById('app').innerHTML = `<div style="text-align:center;margin-top:50px;color:#6b7280"><h2>👋 Welcome!</h2><p>Please select your name above.</p></div>`;
                updateStatus("Waiting...", "saved");
            }
        } catch (e) { console.error(e); updateStatus("Error loading", "error"); }
    }

    function createDefaultLessons() {
        return [1, 2, 3, 4, 5, 6, 7, 8].map(i => ({
            label: `Lesson ${i}`,
            status: "", date: "",
            majorTopic: "", minorTopic: "",
            grammar: "", vocab: "",
            hw: "", quote: "", note: ""
        }));
    }

    // --- TUTOR LOGIC ---
    function getUniqueTutors() {
        const tutors = new Set(allStudents.map(s => s.tutor).filter(t => t));
        return Array.from(tutors).sort();
    }

    function initTutorDropdown() {
        const select = document.getElementById('tutorSelect');
        select.innerHTML = `<option value="" disabled>Select Tutor...</option>`;
        getUniqueTutors().forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        select.innerHTML += `<option value="__NEW__">➕ Add New Tutor...</option>`;
        if(currentTutor) select.value = currentTutor;
    }

    function switchTutor(value) {
        if (value === "__NEW__") {
            const newName = prompt("Tutor Name:");
            if (newName && newName.trim()) {
                currentTutor = newName.trim();
                allStudents.push({ id: Date.now(), tutor: currentTutor, name: "Example Student", lessons: createDefaultLessons() });
                triggerSave(); initTutorDropdown(); document.getElementById('tutorSelect').value = currentTutor;
            } else { document.getElementById('tutorSelect').value = currentTutor || ""; return; }
        } else currentTutor = value;
        localStorage.setItem('lastTutor', currentTutor);
        document.getElementById('addStudentBtn').style.display = 'block';
        render();
    }

    // --- SAVE LOGIC ---
    function triggerSave() {
        render();
        updateStatus("Saving...", "saving");
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveToGoogleSheets, 2000);
    }

    async function saveToGoogleSheets() {
        const payload = allStudents.map(s => ({ tutor: s.tutor, name: s.name, id: s.id, meetLink: s.meetLink, lessons: s.lessons }));
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            updateStatus("Saved", "saved");
        } catch (e) { updateStatus("Save Failed", "error"); }
    }

    function updateStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.color = type === 'error' ? '#dc2626' : (type === 'saved' ? '#059669' : '#d97706');
    }

    // --- CRUD ACTIONS ---
    function addNewStudent() {
        const name = prompt("Student Name:");
        if(!name) return;
        allStudents.push({ id: Date.now(), tutor: currentTutor, name: name, lessons: createDefaultLessons() });
        triggerSave();
    }

    function deleteStudent(id) {
        if(confirm("Delete student?")) { allStudents = allStudents.filter(s => s.id !== id); triggerSave(); }
    }

    function addLesson(id) {
        const s = allStudents.find(s => s.id === id);
        s.lessons.push({ label: `Lesson ${s.lessons.length + 1}`, status: "", date: "", majorTopic: "", minorTopic: "", grammar:"", vocab:"", hw:"", quote:"", note:"" });
        triggerSave();
    }

    function removeLesson(id, index) {
        if(confirm("Delete lesson?")) { allStudents.find(s => s.id === id).lessons.splice(index, 1); triggerSave(); }
    }

    function updateLesson(id, idx, field, val) {
        const s = allStudents.find(s => s.id === id);
        s.lessons[idx][field] = val;
        if(!['status', 'hw', 'date'].includes(field)) {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveToGoogleSheets, 2000);
            updateStatus("Saving...", "saving");
        } else {
            triggerSave();
        }
    }

    function editMeetLink(id) {
        const s = allStudents.find(s => s.id === id);
        let link = prompt("Meet Link:", s.meetLink);
        if (link !== null) { s.meetLink = link.trim(); triggerSave(); }
    }

    // --- AI REPORT GENERATOR ---
    function openReportModal(studentId) {
        document.getElementById('currentReportStudentId').value = studentId;
        const student = allStudents.find(s => s.id === studentId);

        // Populate the Lesson Dropdowns dynamically based on the student's actual lessons
        const startSelect = document.getElementById('startLessonSelect');
        const endSelect = document.getElementById('endLessonSelect');
        startSelect.innerHTML = '';
        endSelect.innerHTML = '';

        student.lessons.forEach((l, index) => {
            const optionHtml = `<option value="${index}">${l.label}</option>`;
            startSelect.innerHTML += optionHtml;
            endSelect.innerHTML += optionHtml;
        });

        // Smart defaults: Select the last 7 lessons if possible
        if (student.lessons.length > 0) {
            let endIdx = student.lessons.length - 1;
            let startIdx = Math.max(0, endIdx - 6); // 7 lessons total
            startSelect.value = startIdx;
            endSelect.value = endIdx;
        }

        document.getElementById('ai-final-report').value = '';
        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('reportModal').style.display = 'none'; }

    async function generateWithAI() {
        const apiKey = document.getElementById('geminiApiKey').value.trim();
        if (!apiKey) { alert("Please enter your Gemini API Key."); return; }
        localStorage.setItem('geminiApiKey', apiKey);

        const studentId = parseInt(document.getElementById('currentReportStudentId').value);
        const student = allStudents.find(s => s.id === studentId);

        const startIdx = parseInt(document.getElementById('startLessonSelect').value);
        const endIdx = parseInt(document.getElementById('endLessonSelect').value);

        if (startIdx > endIdx) {
            alert("Start lesson cannot be after the end lesson.");
            return;
        }

        // Slice the array to get ONLY the selected range of lessons
        const rangeLessons = student.lessons.slice(startIdx, endIdx + 1);

        if (rangeLessons.length === 0) return;

        // Calculate Stats for the AI based on the selected range
        const hwTotal = rangeLessons.filter(l => l.hw).length;
        const hwDone = rangeLessons.filter(l => l.hw === 'done').length;
        const hwPerc = hwTotal > 0 ? Math.round((hwDone / hwTotal) * 100) : 0;
        const attTotal = rangeLessons.filter(l => l.status === 'present' || l.status === 'absent' || l.status === 'late').length;
        const attPres = rangeLessons.filter(l => l.status === 'present' || l.status === 'late').length;
        const attPerc = attTotal > 0 ? Math.round((attPres / attTotal) * 100) : 0;

        // Build Raw Data String
        const rawData = rangeLessons.map(l => `
Lesson Label: ${l.label}
Date: ${l.date || 'No Date'}
Status: ${l.status || 'Not Set'}
Major Topic: ${l.majorTopic || 'None'}
Minor Topic: ${l.minorTopic || 'None'}
Grammar Covered: ${l.grammar || 'None'}
Vocabulary Focus: ${l.vocab || 'None'}
Student Quote: ${l.quote || 'None'}
Tutor's Private Notes: ${l.note || 'None'}
        `).join('\n---\n');

        const systemPrompt = `
You are a highly factual and professional English tutor assistant. Your task is to analyze the provided raw lesson data and write a final progress report strictly in Russian for a language school manager.

CRITICAL RULES:
1. STRICT FACTUALITY: You MUST NOT invent, guess, or hallucinate any improvements, feedback, or quotes. Base all feedback strictly on the provided text (Tutor's Private Notes and Quotes).
2. NO DATA: If there is no information in the data to fill out a specific section, simply write "Нет данных" (No data). Do not make up general statements.
3. NO VOCABULARY WORDS: For section 3, list ONLY the names/titles of the vocabulary topics (Minor topics). DO NOT list the actual vocabulary words taught.
4. FORMAT: Output strictly the numbered format 1 to 9, plain text, no markdown bolding on the numbers.

Calculated data for the requested timeframe:
Homework Completion: ${hwPerc}%
Attendance: ${attPerc}%

Raw lesson data for the requested timeframe:
${rawData}

Report format to strictly follow:
1. Дни проведенных уроков: [List the dates of 'present' or 'late' lessons]
2. Список грамматических тем: [Summarize the grammar taught. If none, write "Нет данных"]
3. Список тем по вокабуляру: [ONLY the names of the vocabulary topics. NO specific English words. If none, write "Нет данных"]
4. Обратная связь по спикингу: [Evaluation based STRICTLY on Private Notes regarding speaking. If none, write "Нет данных"]
5. По улучшению текста: [Evaluation based STRICTLY on Private Notes regarding reading/writing. If none, write "Нет данных"]
6. Любые дополнительные улучшения: [List specific improvements ONLY if stated or clearly derived from Private Notes. Do not invent them, list only what exists. If none, write "Нет данных"]
7. По дз выполняемость и посещаемость: Выполняемость ДЗ: ${hwPerc}%, Посещаемость: ${attPerc}%
8. Уверенность: [Evaluation of confidence based STRICTLY on Private Notes/Quotes. If none, write "Нет данных"]
9. Комментарии самого клиента: [Include direct quotes. If none, write "Нет комментариев"]
`;

        document.getElementById('aiLoader').style.display = 'block';
        document.getElementById('ai-final-report').value = 'Analyzing data and generating factual report...';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt }] }],
                    generationConfig: { temperature: 0.2 } // Lowered temperature to make it more strictly factual
                })
            });

            const aiData = await response.json();
            if (aiData.error) throw new Error(aiData.error.message);

            const text = aiData.candidates[0].content.parts[0].text;
            document.getElementById('ai-final-report').value = text;
        } catch (error) {
            alert("Error connecting to Gemini API: " + error.message);
            document.getElementById('ai-final-report').value = '';
        } finally {
            document.getElementById('aiLoader').style.display = 'none';
        }
    }

    function copyReport() {
        const text = document.getElementById('ai-final-report').value;
        if (!text) { alert("Generate a report first!"); return; }
        navigator.clipboard.writeText(text).then(() => alert("Report copied to WhatsApp format!"));
    }

    // --- RENDER ---
    function render() {
        const app = document.getElementById('app');
        app.innerHTML = "";
        const myStudents = allStudents.filter(s => s.tutor === currentTutor);

        if (myStudents.length === 0) {
            app.innerHTML = `<div style="text-align:center;margin-top:50px;color:#6b7280"><h3>You have no students yet.</h3><p>Click "+ Add Student" to start.</p></div>`;
            return;
        }

        myStudents.forEach(s => {
            let lessonsHtml = s.lessons.map((l, i) => `
                <div class="lesson-unit">
                    <div class="lesson-top">
                        <input class="lesson-label" value="${l.label}" onchange="updateLesson(${s.id}, ${i}, 'label', this.value)">
                        <span class="delete-lesson-btn" onclick="removeLesson(${s.id}, ${i})">&times;</span>
                    </div>

                    <div class="row">
                        <input type="date" value="${l.date}" onchange="updateLesson(${s.id}, ${i}, 'date', this.value)" style="flex:1">
                        <select class="status-select ${l.status === 'present' ? 'status-present' : l.status === 'late' ? 'status-late' : l.status === 'canceled' ? 'status-canceled' : l.status === 'absent' ? 'status-absent' : ''}"
                                onchange="updateLesson(${s.id}, ${i}, 'status', this.value)" style="flex:1">
                            <option value="" ${!l.status?'selected':''}>Status...</option>
                            <option value="present" ${l.status==='present'?'selected':''}>Attended</option>
                            <option value="late" ${l.status==='late'?'selected':''}>Late</option>
                            <option value="canceled" ${l.status==='canceled'?'selected':''}>Canceled</option>
                            <option value="absent" ${l.status==='absent'?'selected':''}>Absent</option>
                        </select>
                    </div>

                    <div class="row">
                        <input placeholder="Major Topic (e.g. Digital Life)" value="${l.majorTopic||''}" oninput="updateLesson(${s.id}, ${i}, 'majorTopic', this.value)" style="flex:1">
                        <input placeholder="Minor Topic (e.g. Social Media)" value="${l.minorTopic||''}" oninput="updateLesson(${s.id}, ${i}, 'minorTopic', this.value)" style="flex:1">
                    </div>

                    <textarea class="input-grammar" placeholder="Grammar rules covered..." oninput="updateLesson(${s.id}, ${i}, 'grammar', this.value)">${l.grammar||''}</textarea>
                    <textarea class="input-vocab" placeholder="Vocabulary list (full words)..." oninput="updateLesson(${s.id}, ${i}, 'vocab', this.value)">${l.vocab||''}</textarea>

                    <div class="row">
                        <select onchange="updateLesson(${s.id}, ${i}, 'hw', this.value)" style="flex:1;">
                            <option value="" ${!l.hw?'selected':''}>HW Status...</option>
                            <option value="done" ${l.hw==='done'?'selected':''}>✅ HW Done</option>
                            <option value="partial" ${l.hw==='partial'?'selected':''}>⚠️ Partial</option>
                            <option value="missed" ${l.hw==='missed'?'selected':''}>❌ No HW</option>
                        </select>
                    </div>

                    <textarea placeholder="Student quote..." oninput="updateLesson(${s.id}, ${i}, 'quote', this.value)" style="height:45px">${l.quote||''}</textarea>
                    <textarea class="input-note" placeholder="Private note (for AI report)..." oninput="updateLesson(${s.id}, ${i}, 'note', this.value)" style="height:60px">${l.note||''}</textarea>
                </div>
            `).join("");

            let meetBtn = s.meetLink
                ? `<a href="${s.meetLink}" target="_blank" class="primary-btn" style="text-decoration:none; padding: 6px 12px; font-size:0.9rem; background:#dbeafe; color:#1e40af;">📹 Join</a>`
                : `<button onclick="editMeetLink(${s.id})" style="background:#f3f4f6; color:#6b7280;">+ Link</button>`;

            app.innerHTML += `
            <div class="student-card">
                <div class="card-header">
                    <div class="header-left">
                        <h3 style="margin:0">${s.name}</h3>
                        ${meetBtn}
                        <button class="report-btn" onclick="openReportModal(${s.id})">✨ Create AI Report</button>
                    </div>
                    <button class="delete-student" onclick="deleteStudent(${s.id})">Delete</button>
                </div>
                <div class="attendance-grid">
                    ${lessonsHtml}
                    <div class="add-lesson-btn" onclick="addLesson(${s.id})">+</div>
                </div>
            </div>`;
        });
        updateStatus("Synced", "saved");
    }

    loadData();
</script>
</body>
</html>
