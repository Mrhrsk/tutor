<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Portal v2</title>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --border: #e5e7eb; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Header */
        header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .tutor-branding { display: flex; align-items: center; gap: 10px; }
        .tutor-select { font-size: 1.5rem; font-weight: 800; border: none; background: transparent; cursor: pointer; border-bottom: 2px dashed #9ca3af; }

        /* Buttons */
        button { border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .primary-btn { background: var(--primary); color: white; }
        .report-btn { background: #7c3aed; color: white; margin-left: 10px; display: flex; align-items: center; gap: 5px; }
        .delete-student { background: #fee2e2; color: #dc2626; font-size: 0.85rem; }

        /* Student Card */
        .student-card { background: var(--card); border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 10px; }

        /* Grid Layout */
        .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

        /* Enhanced Lesson Unit */
        .lesson-unit { border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: #f9fafb; display: flex; flex-direction: column; gap: 8px; position: relative; }

        .lesson-top { display: flex; justify-content: space-between; align-items: center; }
        .lesson-label { font-weight: 700; font-size: 0.9rem; color: #374151; width: 60%; border: none; background: transparent; }
        .delete-lesson-btn { color: #ef4444; cursor: pointer; font-size: 1.2rem; }

        .row { display: flex; gap: 8px; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.8rem; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 40px; font-family: inherit; }

        /* Specific Input Styles */
        .input-grammar { border-color: #bfdbfe; background: #eff6ff; } /* Blue tint for Grammar */
        .input-vocab { border-color: #bbf7d0; background: #f0fdf4; } /* Green tint for Vocab */

        .status-select { font-weight: 600; text-align: center; }
        .status-present { background-color: #dcfce7; color: #166534; }
        .status-late { background-color: #fef9c3; color: #854d0e; }
        .status-canceled { background-color: #ffedd5; color: #9a3412; }
        .status-absent { background-color: #fee2e2; color: #991b1b; }

        .add-lesson-btn { border: 2px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 2rem; cursor: pointer; min-height: 250px; }
        .add-lesson-btn:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

        /* REPORT MODAL STYLES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; width: 90%; max-width: 600px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .modal-footer { padding: 20px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px; }

        .report-section { border: 1px solid #e5e7eb; padding: 10px; border-radius: 8px; background: #f9fafb; }
        .report-label { font-weight: bold; font-size: 0.85rem; color: #4b5563; margin-bottom: 5px; display: block; }
        .report-textarea { width: 100%; min-height: 60px; font-size: 0.9rem; }
        .auto-filled { background-color: #e5e7eb; color: #374151; cursor: not-allowed; }

        .notes-preview { font-size: 0.8rem; color: #6b7280; font-style: italic; margin-bottom: 5px; padding: 5px; background: #fff; border: 1px dashed #d1d5db; border-radius: 4px;}

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="tutor-branding">
            <select id="tutorSelect" class="tutor-select" onchange="switchTutor(this.value)">
                <option value="" disabled selected>Select Tutor...</option>
            </select>
        </div>
        <div>
            <span id="status" style="margin-right:15px; font-weight:600; font-size:0.9rem;">Loading...</span>
            <button id="addStudentBtn" class="primary-btn" onclick="addNewStudent()" style="display:none;">+ Add Student</button>
        </div>
    </header>

    <div id="app"></div>
</div>

<div id="reportModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 style="margin:0">Generate Monthly Report</h3>
            <span style="cursor:pointer; font-size:1.5rem;" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                <label>Month:</label>
                <input type="month" id="reportMonth" onchange="refreshReportData()">
            </div>

            <input type="hidden" id="currentReportStudentId">

            <div>
                <label class="report-label">1. Lesson Dates (Auto)</label>
                <input id="rep-dates" class="auto-filled" readonly>
            </div>

            <div class="row">
                <div style="flex:1">
                    <label class="report-label">2. Grammar Topics</label>
                    <textarea id="rep-grammar" class="report-textarea"></textarea>
                </div>
                <div style="flex:1">
                    <label class="report-label">3. Vocab Topics</label>
                    <textarea id="rep-vocab" class="report-textarea"></textarea>
                </div>
            </div>

            <div>
                <label class="report-label">4. Speaking Feedback</label>
                <div id="notes-speaking" class="notes-preview">Your notes will appear here...</div>
                <textarea id="rep-speaking" class="report-textarea" placeholder="Write feedback..."></textarea>
            </div>

            <div>
                <label class="report-label">5. Text/Writing Improvement</label>
                <textarea id="rep-writing" class="report-textarea" placeholder="Write feedback..."></textarea>
            </div>

            <div>
                <label class="report-label">6. 5 Improvements</label>
                <div id="notes-general" class="notes-preview">Your notes will appear here...</div>
                <textarea id="rep-improvements" class="report-textarea" placeholder="List 5 improvements..."></textarea>
            </div>

            <div>
                <label class="report-label">7. Homework & Attendance (Auto)</label>
                <input id="rep-hw" class="auto-filled" readonly>
            </div>

            <div>
                <label class="report-label">8. Confidence Level</label>
                <textarea id="rep-confidence" class="report-textarea" placeholder="e.g. Student is more confident in..."></textarea>
            </div>

            <div>
                <label class="report-label">9. Student Quotes</label>
                <textarea id="rep-quotes" class="report-textarea"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal()" style="background:#e5e7eb; color:#374151;">Cancel</button>
            <button onclick="copyReport()" class="primary-btn" style="background:#059669;">📋 Copy for WhatsApp</button>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDYYJf56i-PJy-5d4O-DJE-MCZOb9MX3iUiCUllDW-kUraQOCTlZ5Da1PAymNQaycB/exec";

    let allStudents = [];
    let currentTutor = localStorage.getItem('lastTutor') || "";
    let saveTimeout;

    // --- INITIALIZATION ---
    async function loadData() {
        updateStatus("Loading...", "saving");
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const data = await response.json();
            allStudents = data.map(item => {
                let parsed = JSON.parse(item.json);
                return {
                    id: parsed.id || Date.now(),
                    tutor: item.tutor || "Unassigned",
                    name: item.name,
                    meetLink: parsed.meetLink || "",
                    lessons: parsed.lessons || createDefaultLessons()
                };
            });
            initTutorDropdown();
            if (currentTutor && getUniqueTutors().includes(currentTutor)) render();
            else {
                document.getElementById('app').innerHTML = `<div style="text-align:center;margin-top:50px;color:#6b7280"><h2>👋 Welcome!</h2><p>Please select your name above.</p></div>`;
                updateStatus("Waiting...", "saved");
            }
        } catch (e) { console.error(e); updateStatus("Error loading", "error"); }
    }

    function createDefaultLessons() {
        // Updated structure for new requirements
        return [1, 2, 3, 4].map(i => ({
            label: `Lesson ${i}`,
            status: "", date: "",
            grammar: "", vocab: "", // Split topics
            hw: "", quote: "", note: "" // New fields
        }));
    }

    // --- TUTOR LOGIC ---
    function getUniqueTutors() {
        const tutors = new Set(allStudents.map(s => s.tutor).filter(t => t));
        return Array.from(tutors).sort();
    }

    function initTutorDropdown() {
        const select = document.getElementById('tutorSelect');
        select.innerHTML = `<option value="" disabled>Select Tutor...</option>`;
        getUniqueTutors().forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        select.innerHTML += `<option value="__NEW__">➕ Add New Tutor...</option>`;
        if(currentTutor) select.value = currentTutor;
    }

    function switchTutor(value) {
        if (value === "__NEW__") {
            const newName = prompt("Tutor Name:");
            if (newName && newName.trim()) {
                currentTutor = newName.trim();
                allStudents.push({ id: Date.now(), tutor: currentTutor, name: "Example Student", lessons: createDefaultLessons() });
                triggerSave(); initTutorDropdown(); document.getElementById('tutorSelect').value = currentTutor;
            } else { document.getElementById('tutorSelect').value = currentTutor || ""; return; }
        } else currentTutor = value;
        localStorage.setItem('lastTutor', currentTutor);
        document.getElementById('addStudentBtn').style.display = 'block';
        render();
    }

    // --- SAVE LOGIC ---
    function triggerSave() {
        render(); // Optimistic
        updateStatus("Saving...", "saving");
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveToGoogleSheets, 2000);
    }

    async function saveToGoogleSheets() {
        const payload = allStudents.map(s => ({ tutor: s.tutor, name: s.name, id: s.id, meetLink: s.meetLink, lessons: s.lessons }));
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            updateStatus("Saved", "saved");
        } catch (e) { updateStatus("Save Failed", "error"); }
    }

    function updateStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.color = type === 'error' ? '#dc2626' : (type === 'saved' ? '#059669' : '#d97706');
    }

    // --- CRUD ACTIONS ---
    function addNewStudent() {
        const name = prompt("Student Name:");
        if(!name) return;
        allStudents.push({ id: Date.now(), tutor: currentTutor, name: name, lessons: createDefaultLessons() });
        triggerSave();
    }

    function deleteStudent(id) {
        if(confirm("Delete student?")) { allStudents = allStudents.filter(s => s.id !== id); triggerSave(); }
    }

    function addLesson(id) {
        const s = allStudents.find(s => s.id === id);
        s.lessons.push({ label: `Lesson ${s.lessons.length + 1}`, status: "", date: "", grammar:"", vocab:"", hw:"", quote:"", note:"" });
        triggerSave();
    }

    function removeLesson(id, index) {
        if(confirm("Delete lesson?")) { allStudents.find(s => s.id === id).lessons.splice(index, 1); triggerSave(); }
    }

    function updateLesson(id, idx, field, val) {
        const s = allStudents.find(s => s.id === id);
        s.lessons[idx][field] = val;
        // Don't re-render on text input to keep focus, just queue save
        if(field !== 'status' && field !== 'hw') {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveToGoogleSheets, 2000);
            updateStatus("Saving...", "saving");
        } else {
            triggerSave();
        }
    }

    function editMeetLink(id) {
        const s = allStudents.find(s => s.id === id);
        let link = prompt("Meet Link:", s.meetLink);
        if (link !== null) { s.meetLink = link.trim(); triggerSave(); }
    }

    // --- REPORT GENERATOR ---
    function openReportModal(studentId) {
        document.getElementById('currentReportStudentId').value = studentId;
        // Default to current month
        const now = new Date();
        const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        document.getElementById('reportMonth').value = monthStr;

        refreshReportData();
        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('reportModal').style.display = 'none'; }

    function refreshReportData() {
        const studentId = parseInt(document.getElementById('currentReportStudentId').value);
        const monthInput = document.getElementById('reportMonth').value; // "YYYY-MM"
        const student = allStudents.find(s => s.id === studentId);

        if (!student || !monthInput) return;

        // Filter lessons for this month
        const [year, month] = monthInput.split('-');
        const monthLessons = student.lessons.filter(l => {
            if (!l.date) return false;
            const d = new Date(l.date);
            return d.getFullYear() == year && (d.getMonth() + 1) == month;
        });

        // 1. Dates
        const attended = monthLessons.filter(l => l.status === 'present');
        const dateStr = attended.map(l => {
            const d = new Date(l.date);
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
        }).join(', ');
        document.getElementById('rep-dates').value = dateStr || "No attended lessons";

        // 2 & 3 Topics
        document.getElementById('rep-grammar').value = monthLessons.map(l => l.grammar).filter(t => t).join(', ');
        document.getElementById('rep-vocab').value = monthLessons.map(l => l.vocab).filter(t => t).join(', ');

        // 7. HW & Attendance
        const hwDone = monthLessons.filter(l => l.hw === 'done').length;
        const hwTotal = monthLessons.filter(l => l.hw).length; // Only count if assigned
        const hwPerc = hwTotal > 0 ? Math.round((hwDone / hwTotal) * 100) : 0;

        const attTotal = monthLessons.filter(l => l.status === 'present' || l.status === 'absent' || l.status === 'late').length;
        const attPres = monthLessons.filter(l => l.status === 'present' || l.status === 'late').length;
        const attPerc = attTotal > 0 ? Math.round((attPres / attTotal) * 100) : 0;

        document.getElementById('rep-hw').value = `HW: ${hwPerc}% completed. Attendance: ${attPerc}%`;

        // 9. Quotes
        document.getElementById('rep-quotes').value = monthLessons.map(l => l.quote ? `"${l.quote}"` : '').filter(q => q).join('\n');

        // Helper Notes for Subjective fields
        const notes = monthLessons.map(l => l.note).filter(n => n).join(' | ');
        document.getElementById('notes-speaking').innerText = notes ? `Notes from lessons: ${notes}` : "No private notes recorded for this month.";
        document.getElementById('notes-general').innerText = notes ? `Notes from lessons: ${notes}` : "No private notes recorded for this month.";
    }

    function copyReport() {
        const v = (id) => document.getElementById(id).value;
        const report =
            `ОТЧЕТ ежемесячный
1. Дни проведенных уроков: ${v('rep-dates')}
2. Список грамматических тем: ${v('rep-grammar')}
3. Список тем по вокабуляру: ${v('rep-vocab')}
4. Обратная связь по спикингу: ${v('rep-speaking')}
5. По улучшению текста: ${v('rep-writing')}
6. 5 любые улучшения: ${v('rep-improvements')}
7. По дз выполняемость и посещаемость: ${v('rep-hw')}
8. Уверенность: ${v('rep-confidence')}
9. Комментарии самого клиента:
${v('rep-quotes')}`;

        navigator.clipboard.writeText(report).then(() => alert("Report copied to clipboard!"));
    }

    // --- RENDER ---
    function render() {
        const app = document.getElementById('app');
        app.innerHTML = "";
        const myStudents = allStudents.filter(s => s.tutor === currentTutor);

        if (myStudents.length === 0) {
            app.innerHTML = `<div style="text-align:center;margin-top:50px;color:#6b7280"><h3>You have no students yet.</h3><p>Click "+ Add Student" to start.</p></div>`;
            return;
        }

        myStudents.forEach(s => {
            let lessonsHtml = s.lessons.map((l, i) => `
                <div class="lesson-unit">
                    <div class="lesson-top">
                        <input class="lesson-label" value="${l.label}" onchange="updateLesson(${s.id}, ${i}, 'label', this.value)">
                        <span class="delete-lesson-btn" onclick="removeLesson(${s.id}, ${i})">&times;</span>
                    </div>

                    <div class="row">
                        <input type="date" value="${l.date}" onchange="updateLesson(${s.id}, ${i}, 'date', this.value)" style="flex:1">
                        <select class="status-select ${l.status === 'present' ? 'status-present' : l.status === 'late' ? 'status-late' : l.status === 'canceled' ? 'status-canceled' : l.status === 'absent' ? 'status-absent' : ''}"
                                onchange="updateLesson(${s.id}, ${i}, 'status', this.value)" style="flex:1">
                            <option value="" ${!l.status?'selected':''}>Status...</option>
                            <option value="present" ${l.status==='present'?'selected':''}>Attended</option>
                            <option value="late" ${l.status==='late'?'selected':''}>Late</option>
                            <option value="canceled" ${l.status==='canceled'?'selected':''}>Canceled</option>
                            <option value="absent" ${l.status==='absent'?'selected':''}>Absent</option>
                        </select>
                    </div>

                    <div class="row">
                        <input class="input-grammar" placeholder="Grammar..." value="${l.grammar||''}" oninput="updateLesson(${s.id}, ${i}, 'grammar', this.value)">
                    </div>
                    <div class="row">
                        <input class="input-vocab" placeholder="Vocab..." value="${l.vocab||''}" oninput="updateLesson(${s.id}, ${i}, 'vocab', this.value)">
                    </div>

                    <div class="row">
                        <select onchange="updateLesson(${s.id}, ${i}, 'hw', this.value)" style="flex:1; font-size:0.8rem;">
                            <option value="" ${!l.hw?'selected':''}>HW Status...</option>
                            <option value="done" ${l.hw==='done'?'selected':''}>✅ HW Done</option>
                            <option value="partial" ${l.hw==='partial'?'selected':''}>⚠️ Partial</option>
                            <option value="missed" ${l.hw==='missed'?'selected':''}>❌ No HW</option>
                        </select>
                    </div>

                    <textarea placeholder="Student quote..." oninput="updateLesson(${s.id}, ${i}, 'quote', this.value)" style="height:40px">${l.quote||''}</textarea>
                    <textarea placeholder="Private note (for report)..." oninput="updateLesson(${s.id}, ${i}, 'note', this.value)" style="height:40px; background:#fffbeb; border-color:#fcd34d;">${l.note||''}</textarea>
                </div>
            `).join("");

            let meetBtn = s.meetLink
                ? `<a href="${s.meetLink}" target="_blank" class="primary-btn" style="text-decoration:none; padding: 6px 12px; font-size:0.9rem; background:#dbeafe; color:#1e40af;">📹 Join</a>`
                : `<button onclick="editMeetLink(${s.id})" style="background:#f3f4f6; color:#6b7280;">+ Link</button>`;

            app.innerHTML += `
            <div class="student-card">
                <div class="card-header">
                    <div class="header-left">
                        <h3 style="margin:0">${s.name}</h3>
                        ${meetBtn}
                        <button class="report-btn" onclick="openReportModal(${s.id})">📄 Report</button>
                    </div>
                    <button class="delete-student" onclick="deleteStudent(${s.id})">Delete</button>
                </div>
                <div class="attendance-grid">
                    ${lessonsHtml}
                    <div class="add-lesson-btn" onclick="addLesson(${s.id})">+</div>
                </div>
            </div>`;
        });
        updateStatus("Synced", "saved");
    }

    loadData();
</script>
</body>
</html>
